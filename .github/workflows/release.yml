name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            label: Windows (x64)
          - platform: ubuntu-22.04
            args: ""
            label: Linux (x64)
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macOS (Apple Silicon)
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            label: macOS (Intel)

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "shutdwn ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads / Descargas

            - **Windows** → `.msi`
            - **macOS (Apple Silicon)** → `.dmg`
            - **macOS (Intel)** → `.dmg`
            - **Linux** → `.AppImage` / `.deb`

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
